name: Deploy Infraestrutura
run-name: ${{ github.actor }} iniciou o deploy 

on:
  push:
    branches: [ "stg", "prod" ]
  workflow_dispatch:

permissions:
  id-token: write # permite que a action solicite o token OIDC
  contents: read  # permite que a action baixe o seu código

jobs:
  # 1. Validação do código
  codevalidate:
    name: "Verifica o código Terraform"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform validate

  # 2. Verificação de Segurança
  security_scan:
    name: "Análise de Segurança"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          
  # 3. Provisionamento e Configuração
  infraestrutura:
    name: "Provisionar e Configurar"
    runs-on: ubuntu-latest
    needs: [codevalidate, security_scan]
    env:
      TF_VAR_bloco_ips_liberados: ${{ secrets.IPS_PERMITIDOS }}
      TF_WORKING_DIR: ${{ github.ref == 'refs/heads/prod' && './production' || './staging' }}
      TF_VAR_chave_ssh: ${{ github.ref == 'refs/heads/production' && secrets.CHAVE_PROD || secrets.CHAVE_STAG }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Criar arquivo de backend (PROD)
        if: github.ref == 'refs/heads/prod' 
        run: |
          cat <<'EOF' > backend-config.tfvars
          ${{ secrets.BACKEND_CONFIG_PROD }}
          EOF

      - name: Criar arquivo de backend (STG)
        if: github.ref == 'refs/heads/stg' 
        run: |
          cat <<'EOF' > backend-config.tfvars
          ${{ secrets.BACKEND_CONFIG_STG }}
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=../backend-config.tfvars -reconfigure
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Autorizar IP do Runner no Security Group
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # 1. Captura o IP do Runner (para usar no --cidr)
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=${RUNNER_IP}" >> $GITHUB_ENV
          
          # 2. DEBUG: Lista todos os outputs para o log
          # Isso vai mostrar se 'security_group_id_web' está vindo com o IP por engano
          echo "--- LISTA DE OUTPUTS DO TERRAFORM ---"
          terraform output
          echo "-------------------------------------"
          
          # 3. Captura o ID garantindo que não existam aspas ou espaços
          # Usamos o nome exato que você definiu na raiz: security_group_id_web
          SG_ID=$(terraform output -raw security_group_id_web | tr -d '"')
          
          # 4. VALIDAÇÃO CRÍTICA: Se não começar com sg-, o script para aqui com erro claro
          if [[ ! $SG_ID =~ ^sg- ]]; then
            echo "ERRO: O output capturado foi '$SG_ID', mas a AWS exige um ID que comece com 'sg-'."
            echo "Verifique se o 'value' no outputs.tf da raiz está apontando para o IP em vez do ID."
            exit 1
          fi
          
          echo "SG_ID=${SG_ID}" >> $GITHUB_ENV
          
          # 5. Execução do comando AWS com variáveis protegidas
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32"

      - name: Configurar Inventário do Ansible
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "[web]" > hosts.ini
          echo "$(terraform output -raw ip_publico_web) ansible_user=ec2-user" >> hosts.ini
          echo "" >> hosts.ini
          echo "[db]" >> hosts.ini
          echo "$(terraform output -raw ip_privado_db) ansible_user=ec2-user" >> hosts.ini
          
      - name: Rodar Ansible Playbook
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          SSH_PRIVATE_KEY: ${{ github.ref == 'refs/heads/prod' && secrets.AWS_SSH_KEY_PROD || secrets.AWS_SSH_KEY_STG }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 400 key.pem
          
          WEB_IP=$(terraform output -raw ip_publico_web)
          
          # Adicionado o ../ antes do nome do playbook
          ansible-playbook -i hosts.ini ../playbook.yml --private-key key.pem \
            --ssh-common-args="-o ProxyCommand='ssh -i key.pem -W %h:%p -q ec2-user@$WEB_IP -o StrictHostKeyChecking=no' -o StrictHostKeyChecking=no"

      - name: Remover IP do Runner do Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ env.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ env.RUNNER_IP }}/32